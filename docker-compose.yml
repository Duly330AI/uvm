services:
  web:
    build:
      context: ./backend/app
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      REDIS_URL: redis://redis:6379/0
      SITE_DOMAIN: localhost:8000
      DEFAULT_FROM_EMAIL: noreply@localhost
      EMAIL_HOST: mailhog
      EMAIL_PORT: "1025"
      SECURE_SSL_REDIRECT: "0"
    entrypoint: []
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    volumes:
      # Mount source code for live reload in development
      - ./backend/app:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ./backend/app
      dockerfile: Dockerfile
    entrypoint: []  # Override entrypoint for worker
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      REDIS_URL: redis://redis:6379/0
      SITE_DOMAIN: localhost:8000
      DEFAULT_FROM_EMAIL: noreply@localhost
      EMAIL_HOST: mailhog
      EMAIL_PORT: "1025"
      SECURE_SSL_REDIRECT: "0"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0"
      DJANGO_CSRF_TRUSTED_ORIGINS: "http://localhost:8000,http://127.0.0.1:8000,http://0.0.0.0:8000"
    command: celery -A config.celery_app worker -l info -Q default,emails --prefetch-multiplier=1 --concurrency=2
    volumes:
      - ./backend/app:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: ./backend/app
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev  # Security Fix 2025-10-20: Use dev settings (was prod)
      REDIS_URL: redis://redis:6379/0
      SECURE_SSL_REDIRECT: "0"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0"
      DJANGO_CSRF_TRUSTED_ORIGINS: "http://localhost:8000,http://127.0.0.1:8000,http://0.0.0.0:8000"
    command: celery -A config beat -l info
    volumes:
      - ./backend/app:/app
    depends_on:
      redis:
        condition: service_healthy
      worker:
        condition: service_started

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: landlord
      POSTGRES_USER: landlord
      POSTGRES_PASSWORD: landlord
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U landlord"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - dbdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    command: server /data --console-address :9001
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - minio:/data

  mailhog:
    image: mailhog/mailhog
    ports:
      - "8025:8025"

volumes:
  dbdata: {}
  minio: {}
