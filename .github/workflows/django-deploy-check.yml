name: Django Deploy Check

# Phase 1.8 - 2025-10-22: Automated production deployment validation
# Runs on every push to main and on pull requests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        cd backend/app
        pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run Django Deploy Check
      env:
        # Minimal production-like env vars for deploy check
        SECRET_KEY: ${{ secrets.DEPLOY_CHECK_SECRET_KEY || 'test-secret-key-for-ci-only-not-for-production-use-minimum-50-chars' }}
        DJANGO_ALLOWED_HOSTS: example.com,www.example.com
        DATABASE_URL: postgres://user:pass@localhost/dbname
        REDIS_URL: redis://localhost:6379/0
        DJANGO_SETTINGS_MODULE: config.settings.prod
      run: |
        cd backend/app
        python manage.py check --deploy --fail-level WARNING
    
    - name: Verify Production Settings
      env:
        SECRET_KEY: ${{ secrets.DEPLOY_CHECK_SECRET_KEY || 'test-secret-key-for-ci-only-not-for-production-use-minimum-50-chars' }}
        DJANGO_ALLOWED_HOSTS: example.com
        DATABASE_URL: postgres://user:pass@localhost/dbname
        REDIS_URL: redis://localhost:6379/0
        DJANGO_SETTINGS_MODULE: config.settings.prod
      run: |
        cd backend/app
        python -c "
        import os
        os.environ.setdefault('DJANGO_SETTINGS_MODULE', 'config.settings.prod')
        import django
        django.setup()
        from django.conf import settings
        
        # Verify critical production settings
        assert settings.DEBUG == False, 'DEBUG must be False in production'
        assert settings.SECRET_KEY != 'change-me', 'SECRET_KEY must not be default'
        assert len(settings.SECRET_KEY) >= 50, 'SECRET_KEY must be at least 50 chars'
        assert settings.ALLOWED_HOSTS, 'ALLOWED_HOSTS must be configured'
        assert settings.SESSION_COOKIE_SECURE == True, 'SESSION_COOKIE_SECURE must be True'
        assert settings.CSRF_COOKIE_SECURE == True, 'CSRF_COOKIE_SECURE must be True'
        assert settings.SESSION_COOKIE_HTTPONLY == True, 'SESSION_COOKIE_HTTPONLY must be True'
        
        print('✅ All production security settings validated!')
        "
