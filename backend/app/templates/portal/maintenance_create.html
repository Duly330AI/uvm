{% extends "portal/base.html" %} {% load static %}
{% block title %}Neue Wartung
- UVM{% endblock %}
{% block content %}
<div class="container mx-auto px-4 py-8 max-w-3xl">
  <!-- Back Button -->
  <a
    href="{% url 'portal_maintenance_list' %}"
    class="text-blue-600 hover:text-blue-800 mb-4 inline-block"
  >
    ← Zurück zur Liste
  </a>

  <!-- Header -->
  <div class="mb-6">
    <h1 class="text-3xl font-bold text-gray-900">➕ Neue Wartungsaufgabe</h1>
    <p class="text-gray-600 mt-1">
      Planen Sie eine neue Wartung oder Inspektion
    </p>
  </div>

  <!-- Form -->
  <form method="post" class="bg-white rounded-lg shadow-sm p-6 space-y-6">
    {% csrf_token %}

    <!-- Title -->
    <div>
      <label for="title" class="block text-sm font-medium text-gray-700 mb-2">
        Titel *
      </label>
      <input
        type="text"
        id="title"
        name="title"
        required
        placeholder="z.B. Rauchmelder-Prüfung Wohnung A1"
        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-transparent"
      />
    </div>

    <!-- Category -->
    <div>
      <label
        for="category"
        class="block text-sm font-medium text-gray-700 mb-2"
      >
        Kategorie *
      </label>
      <select
        id="category"
        name="category"
        required
        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500"
      >
        <option value="">-- Bitte wählen --</option>
        {% for value, label in categories %}
        <option value="{{ value }}">{{ label }}</option>
        {% endfor %}
      </select>
    </div>

    <!-- Description -->
    <div>
      <label
        for="description"
        class="block text-sm font-medium text-gray-700 mb-2"
      >
        Beschreibung
      </label>
      <textarea
        id="description"
        name="description"
        rows="4"
        placeholder="Details zur Wartungsaufgabe..."
        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500"
      ></textarea>
    </div>

    <!-- Due Date -->
    <div>
      <label
        for="due_date"
        class="block text-sm font-medium text-gray-700 mb-2"
      >
        Fälligkeit *
      </label>
      <input
        type="date"
        id="due_date"
        name="due_date"
        required
        min="{{ today|date:'Y-m-d' }}"
        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500"
      />
    </div>

    <!-- Location -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label
          for="property"
          class="block text-sm font-medium text-gray-700 mb-2"
        >
          Objekt (optional)
        </label>
        <select
          id="property"
          name="property"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500"
        >
          <option value="">-- Kein Objekt --</option>
          {% for prop in properties %}
          <option value="{{ prop.id }}">{{ prop }}</option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label for="unit" class="block text-sm font-medium text-gray-700 mb-2">
          Wohnung (optional)
        </label>
        <select
          id="unit"
          name="unit"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500"
        >
          <option value="">-- Keine Wohnung --</option>
          {% for unit in units %}
          <option value="{{ unit.id }}">
            {{ unit.unit_label }} @ {{ unit.property }}
          </option>
          {% endfor %}
        </select>
      </div>
    </div>

    <!-- Estimated Cost -->
    <div>
      <label
        for="estimated_cost"
        class="block text-sm font-medium text-gray-700 mb-2"
      >
        Geschätzte Kosten (€)
      </label>
      <input
        type="number"
        id="estimated_cost"
        name="estimated_cost"
        step="0.01"
        min="0"
        placeholder="0.00"
        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500"
      />
    </div>

    <!-- Submit -->
    <div class="flex gap-4 pt-4">
      <button
        type="submit"
        class="flex-1 bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-semibold transition"
      >
        ✓ Wartung erstellen
      </button>
      <a
        href="{% url 'portal_maintenance_list' %}"
        class="px-6 py-3 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition text-center"
      >
        Abbrechen
      </a>
    </div>
  </form>
</div>
{% endblock %}
