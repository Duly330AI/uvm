{% extends "portal/base.html" %}
{% load static %}

{% block title %}Wartung bearbeiten - UVM{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8 max-w-3xl">
    <a href="{% url 'portal_maintenance_detail' item.id %}" class="text-blue-600 hover:text-blue-800 mb-4 inline-block">
        ← Zurück
    </a>

    <div class="mb-6">
        <h1 class="text-3xl font-bold text-gray-900">✏️ Wartung bearbeiten</h1>
        <p class="text-gray-600 mt-1">{{ item.title }}</p>
    </div>

    <form method="post" class="bg-white rounded-lg shadow-sm p-6 space-y-6">
        {% csrf_token %}

        <div>
            <label for="title" class="block text-sm font-medium text-gray-700 mb-2">Titel *</label>
            <input type="text" id="title" name="title" value="{{ item.title }}" required
                   class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
            <label for="category" class="block text-sm font-medium text-gray-700 mb-2">Kategorie *</label>
            <select id="category" name="category" required
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500">
                {% for value, label in categories %}
                <option value="{{ value }}" {% if item.category == value %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label for="description" class="block text-sm font-medium text-gray-700 mb-2">Beschreibung</label>
            <textarea id="description" name="description" rows="4"
                      class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500">{{ item.description }}</textarea>
        </div>

        <div>
            <label for="due_date" class="block text-sm font-medium text-gray-700 mb-2">Fälligkeit *</label>
            <input type="date" id="due_date" name="due_date" value="{{ item.due_date|date:'Y-m-d' }}" required
                   class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label for="property" class="block text-sm font-medium text-gray-700 mb-2">Objekt</label>
                <select id="property" name="property"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500">
                    <option value="">-- Kein Objekt --</option>
                    {% for prop in properties %}
                    <option value="{{ prop.id }}" {% if item.property.id == prop.id %}selected{% endif %}>{{ prop }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label for="unit" class="block text-sm font-medium text-gray-700 mb-2">Wohnung</label>
                <select id="unit" name="unit"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500">
                    <option value="">-- Keine Wohnung --</option>
                    {% for unit in units %}
                    <option value="{{ unit.id }}" {% if item.unit.id == unit.id %}selected{% endif %}>{{ unit.unit_label }} @ {{ unit.property }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div>
            <label for="estimated_cost" class="block text-sm font-medium text-gray-700 mb-2">Geschätzte Kosten (€)</label>
            <input type="number" id="estimated_cost" name="estimated_cost" step="0.01" min="0"
                   value="{{ item.estimated_cost }}"
                   class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500">
        </div>

        <div class="flex gap-4 pt-4">
            <button type="submit"
                    class="flex-1 bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-semibold transition">
                ✓ Speichern
            </button>
            <a href="{% url 'portal_maintenance_detail' item.id %}"
               class="px-6 py-3 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition text-center">
                Abbrechen
            </a>
        </div>
    </form>
</div>
{% endblock %}
