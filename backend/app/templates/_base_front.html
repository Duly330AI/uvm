<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>{% block title %}Vermieter Portal{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script>
      // CSRF Helper für htmx/fetch
      function getCookie(name) {
        const m = document.cookie.match(
          "(^|;)\\s*" + name + "\\s*=\\s*([^;]+)"
        );
        return m ? m.pop() : "";
      }
      // HTMX auto-CSRF
      document.addEventListener("htmx:configRequest", (e) => {
        const token = getCookie("csrftoken");
        if (token) e.detail.headers["X-CSRFToken"] = token;
      });
      // Global fetch wrapper to add CSRF
      const originalFetch = window.fetch;
      window.fetch = function (...args) {
        const [url, options = {}] = args;
        const token = getCookie("csrftoken");
        if (token && options.method && options.method.toUpperCase() !== "GET") {
          options.headers = options.headers || {};
          if (options.headers instanceof Headers) {
            options.headers.set("X-CSRFToken", token);
          } else {
            options.headers["X-CSRFToken"] = token;
          }
        }
        return originalFetch(url, options);
      };
    </script>
    {% block head %}
{% endblock %}
  </head>
  <body class="bg-slate-50 text-slate-900">
    <header class="border-b bg-white">
      <div
        class="mx-auto max-w-3xl px-4 py-3 flex items-center justify-between"
      >
        <a href="/" class="font-semibold tracking-tight">UVM</a>
        {% block header_right %}
{% endblock %}
      </div>
    </header>
    <main class="mx-auto max-w-3xl px-4 py-6">
      {% block content %}
{% endblock %}
    </main>
    {% block foot %}
{% endblock %}
  </body>
</html>
